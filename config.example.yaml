# =============================================================================
# mcp_socket_server 配置示例
# 复制此文件为 config.yaml 修改后使用:cp config.example.yaml config.yaml
# 所有项均可省略,省略则用默认值。环境变量可覆盖部分项(见各项注释)。
# =============================================================================

# -----------------------------------------------------------------------------
# bind: MCP Streamable HTTP 服务监听地址
# -----------------------------------------------------------------------------
bind:
  # host: 监听 IP 地址。
  #   - "0.0.0.0"  监听所有网卡(内网部署,允许其他机器连)  [默认]
  #   - "127.0.0.1" 仅本机连(测试用,Cherry Studio 在同一台机器)
  #   - "10.12.131.81" 仅监听指定网卡 IP
  #   环境变量 MCP_BIND_HOST 可覆盖。
  host: 0.0.0.0

  # port: MCP HTTP 监听端口。Cherry Studio 的 URL 用 http://host:port/mcp
  #   环境变量 MCP_BIND_PORT 可覆盖。
  port: 8080

# -----------------------------------------------------------------------------
# db_path: SQLite 数据库文件路径。
# 用于靶机注册表(registry)和审计日志(audit),同一文件内两张表。
# 目录必须存在且可写。运行后会产生 .db / .db-shm / .db-wal 三个文件(WAL 模式)。
# -----------------------------------------------------------------------------
db_path: ./mcp_socket_server.db

# -----------------------------------------------------------------------------
# behind_proxy: 是否在反向代理(nginx 等)后面。
#   - false  审计源 IP 取 ASGI 直连 peer(客户端真实 IP)[默认]
#   - true   审计源 IP 取 HTTP 头 X-Forwarded-For 的第一个值(反代场景)
# 只影响审计日志里的 source_ip 字段,不影响功能。
# -----------------------------------------------------------------------------
behind_proxy: false

# -----------------------------------------------------------------------------
# audit_retention_days: 审计日志保留天数。
#   - 正整数  启动时清理超过 N 天的 audit_log 记录
#   - 0      不清理(永久保留)
# 默认 90 天。
# -----------------------------------------------------------------------------
audit_retention_days: 90

# -----------------------------------------------------------------------------
# download_dir: file_download 工具下载文件的存放根目录。
# 实际路径为 {download_dir}/{target_host}/{文件名},自动创建子目录。
# -----------------------------------------------------------------------------
download_dir: ./downloads

# -----------------------------------------------------------------------------
# log_level: 日志级别。
#   - "INFO"   只输出关键信息(启动、工具调用入口、错误)[默认,生产用]
#   - "DEBUG"  输出全链路诊断日志:工具调用、锁获取、池借出、TCP connect、
#              send/recv 字节数、各阶段耗时。定位问题用。
#   环境变量 MCP_LOG_LEVEL 可覆盖。
# -----------------------------------------------------------------------------
log_level: INFO

# -----------------------------------------------------------------------------
# pool: 连接池参数。每台靶机独立一个池。
# -----------------------------------------------------------------------------
pool:
  # max_conn_per_target: 单台靶机最大并发 TCP 连接数。
  #   同一靶机的多个工具调用共享此池,超过则排队等待(borrow_timeout 内拿不到则失败)。
  #   socket_server 是单线程,设太大无益;设 1 则该靶机完全串行。
  max_conn_per_target: 5

  # idle_timeout: 空闲连接保留秒数。超过此时间未用的连接关闭重建。
  #   服务端 socket_server 是持久连接(handle 循环),复用可省握手开销。
  #   单位:秒。默认 600(10 分钟)。
  idle_timeout: 600

  # borrow_timeout: 从池借连接的等待超时秒数。
  #   池满(max_conn_per_target 用尽)时,新请求等待此秒数还拿不到则报错失败。
  #   单位:秒。默认 10。
  borrow_timeout: 10

  # max_global_concurrency: 全局并行靶机数上限。
  #   跨所有靶机的并发工具调用总数上限(ThreadPoolExecutor 线程数)。
  #   靶机多时调大;靶机少时无需改。
  max_global_concurrency: 50

# -----------------------------------------------------------------------------
# cmd_exec_whitelist: 命令执行白名单。
#   - 空列表 []  放行所有命令(无限制,仅靠审计记录)[默认,内网信任场景]
#   - 非空列表   只允许 args 以列表中某项开头的命令,其余直接拒绝(不发给靶机)
#
#   匹配规则:args.strip().startswith(白名单项),即前缀匹配。
#   例:["ls", "ping", "tcpdump", "cat", "grep", "ps"]
#     - "ls -la /tmp"       放行(以 "ls" 开头)
#     - "rm -rf /"          拒绝(rm 不在白名单)
#     - "tcpdump -i eth0"   放行(以 "tcpdump" 开头)
#
#   注意:前缀匹配有局限,"ls" 也会放行 "ls;rm -rf /"(分号后是另一条命令)。
#   严格场景请配合靶机侧的 sudoers / 命令封装,不要只靠此处。
# -----------------------------------------------------------------------------
cmd_exec_whitelist: []
